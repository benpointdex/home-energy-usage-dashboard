spring.application.name=usage-service

server.port=${SERVER_PORT:8083}

#Kafka - consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=usage-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=energyUsageEvent:com.henry.usage_service.kafka.EnergyUsageEvent,com.henry.ingestion_service.kafka.EnergyUsageEvent:com.henry.usage_service.kafka.EnergyUsageEvent


#Kafka - producer
spring.kafka.template.default-topic=energy-alerts
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


#Influx DB Configuration
influx.url=${INFLUX_URL:http://localhost:8072}
influx.token=${INFLUX_TOKEN:my-token}
influx.org=${INFLUX_ORG:henry}
influx.bucket=${INFLUX_BUCKET:usage-bucket}




device.service.url=${DEVICE_SERVICE_URL:http://localhost:8081/api/v1/device}
user.service.url=${USER_SERVICE_URL:http://localhost:8080/api/v1/user}

