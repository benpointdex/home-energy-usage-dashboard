spring.application.name=user-service
server.port=${SERVER_PORT:8080}

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/home_energy_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

# Flyway Configuration to bypass local migration mismatches in development
spring.flyway.ignore-migration-patterns=*:missing
spring.flyway.out-of-order=true

# Keycloak Admin API — used by KeycloakAdminService for GAP-01 registration
# Create a client 'het-admin-client' in het-realm with service-accounts + manage-users role
keycloak.admin.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8091}
keycloak.admin.realm=${KEYCLOAK_REALM:het-realm}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:het-admin-client}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:uvVnDSF8IUIeEbj6QNkrQIzBZqksYu9W}