spring.application.name=gateway-service
server.port=9000


# Actuator
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers


#Resilinece4j Properties
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=8
resilience4j.circuitbreaker.configs.default.failureRateThreshold=20
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=4
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
# Create named instance
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.usageServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.insightServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.ingestionServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.deviceServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.alertServiceCircuitBreaker.baseConfig=default