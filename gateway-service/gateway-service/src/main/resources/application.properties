spring.application.name=gateway-service
server.port=${SERVER_PORT:9000}


# Actuator
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers


#Resilinece4j Properties
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=8
resilience4j.circuitbreaker.configs.default.failureRateThreshold=20
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=4
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
# Create named instance
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.usageServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.insightServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.ingestionServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.deviceServiceCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.alertServiceCircuitBreaker.baseConfig=default

# Resilience4j TimeLimiter Properties
resilience4j.timelimiter.configs.default.timeout-duration=120s
resilience4j.timelimiter.instances.insightServiceCircuitBreaker.timeout-duration=120s


#Keycloak
keycloak.auth.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8091/realms/het-realm/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8091/realms/het-realm}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

#Security
security.excluded.urls=/actuator/**,/swagger-ui.html,/swagger-ui/**,/docs/**,/v3/api-docs/**,/swagger-resources/**,/api-docs/**,/api/v1/user/register

# Keycloak token endpoint (called server-side from gateway)
keycloak.token-url=${KEYCLOAK_TOKEN_URL:http://localhost:8091/realms/het-realm/protocol/openid-connect/token}
keycloak.logout-url=${KEYCLOAK_LOGOUT_URL:http://localhost:8091/realms/het-realm/protocol/openid-connect/logout}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:het-client}

# Cookie settings
auth.cookie.name=het_refresh_token
auth.cookie.max-age-seconds=604800

# Route Target Services URLs
services.user-service.url=${USER_SERVICE_URL:http://localhost:8080}
services.device-service.url=${DEVICE_SERVICE_URL:http://localhost:8081}
services.ingestion-service.url=${INGESTION_SERVICE_URL:http://localhost:8082}
services.usage-service.url=${USAGE_SERVICE_URL:http://localhost:8083}
services.alert-service.url=${ALERT_SERVICE_URL:http://localhost:8084}
services.insight-service.url=${INSIGHT_SERVICE_URL:http://localhost:8085}

# CORS Allowed Origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:3000}